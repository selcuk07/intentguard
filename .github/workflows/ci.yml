name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  sdk:
    name: SDK Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install SDK deps
        working-directory: packages/sdk
        run: npm install
      - name: Type check
        working-directory: packages/sdk
        run: npx tsc --noEmit
      - name: Build CJS + ESM
        working-directory: packages/sdk
        run: npm run build

  rust:
    name: Rust Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cargo check
        run: cargo check --manifest-path programs/intent-guard/Cargo.toml
